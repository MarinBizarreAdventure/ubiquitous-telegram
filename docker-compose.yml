services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cityguide
      POSTGRES_PASSWORD: cityguide
      POSTGRES_DB: cityguide
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cityguide"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      DATABASE_URL: postgresql://cityguide:cityguide@db:5432/cityguide
      OPEN_METEO_BASE_URL: https://api.open-meteo.com
      DATA_DIR: ./data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./vercel_front_end
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
